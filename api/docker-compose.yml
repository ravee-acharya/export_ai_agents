version: "3.9"

# ExportAI — full production stack
#
# Services:
#   redis    — session storage
#   api      — FastAPI backend (LangGraph orchestrator + all agents)
#   ui       — Streamlit frontend
#
# Usage:
#   docker compose up --build         # first run
#   docker compose up                 # subsequent runs
#   docker compose down               # stop
#   docker compose logs api -f        # tail API logs
#
# Environment:
#   Copy .env.example to .env and fill in your API keys.
#   The .env file is gitignored and never committed.

services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - EXPORT_AI_LLM=${EXPORT_AI_LLM:-openrouter}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - SESSION_TTL_SECONDS=${SESSION_TTL_SECONDS:-86400}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 20s
      timeout: 10s
      start_period: 30s
      retries: 3

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  redis_data:
